version: '3.8'

services:
  db:
    image: postgres:16
    container_name: talentverify_db
    environment:
      POSTGRES_DB: talentverify
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: talentverify_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  web:
    build: .
    container_name: talentverify_web
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY}
      - DB_NAME=talentverify
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - FIELD_ENCRYPTION_KEY=${FIELD_ENCRYPTION_KEY}
      - SEARCH_HMAC_KEY=${SEARCH_HMAC_KEY}
      - TV_ADMIN_EMAIL=${TV_ADMIN_EMAIL}
      - TV_ADMIN_PASSWORD=${TV_ADMIN_PASSWORD}
      - VITE_API_URL=http://localhost/api
    volumes:
      - staticfiles:/app/staticfiles
      - media:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/auth/me/"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: talentverify_frontend
    volumes:
      - frontend_build:/app/dist
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: talentverify_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - staticfiles:/var/www/static
      - media:/var/www/media
      - frontend_build:/var/www/html
    depends_on:
      - web
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  staticfiles:
  media:
  frontend_build:

networks:
  default:
    name: talentverify_network
